<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Ale Bautista</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }

  /* ---------- NAVBAR ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    background: #fff;
    border-bottom: 1px solid #eee;
    z-index: 100;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.08em;
  }
  .nav-links { display: flex; gap: 36px; }
  .nav-links a {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #111;
    padding-bottom: 4px;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s ease;
  }
  .nav-links a:hover { text-decoration: underline; text-underline-offset: 6px; }
  .nav-links a.active { border-bottom: 2px solid #111; }
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    background: none; border: none; cursor: pointer; padding: 6px;
  }
  .hamburger span { width: 22px; height: 1.5px; background: #111; }
  @media (max-width: 720px) {
    .nav { padding: 0 20px; }
    .nav-links {
      position: absolute; top: 64px; left: 0; right: 0;
      background: #fff; flex-direction: column; gap: 0;
      border-bottom: 1px solid #eee;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .nav-links.open { max-height: 360px; }
    .nav-links a { padding: 18px 20px; border-bottom: 1px solid #f4f4f4; }
    .nav-links a.active { border-bottom: 1px solid #f4f4f4; background: #fafafa; }
    .hamburger { display: flex; }
  }

  main { padding-top: 64px; }

  /* ---------- CONTACT ---------- */
  .contact {
    min-height: calc(100vh - 64px);
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 80px;
    padding: 140px 80px 120px;
    align-items: start;
  }
  .c-left {
    display: flex; flex-direction: column;
    gap: 48px;
    padding-top: 12px;
  }
  .c-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 11vw, 180px);
    line-height: 0.9;
    letter-spacing: 0.02em;
  }
  .c-title .dot { color: #999; }
  .c-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #444;
    line-height: 1.9;
    display: flex; flex-direction: column;
    gap: 18px;
  }
  .c-info a { border-bottom: 1px solid transparent; transition: border-color 0.2s ease; }
  .c-info a:hover { border-bottom-color: #111; }
  .c-info .blk { display: flex; flex-direction: column; }
  .c-socials { display: flex; gap: 18px; margin-top: 8px; }
  .c-socials a {
    width: 40px; height: 40px;
    border: 1px solid #111;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .c-socials a:hover { background: #111; color: #fff; }
  .c-socials svg { width: 18px; height: 18px; }

  /* ---------- FORM ---------- */
  .c-form {
    display: flex; flex-direction: column;
    gap: 28px;
    max-width: 640px;
  }
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #111;
    letter-spacing: 0.04em;
  }
  .field label .req { color: #999; font-weight: 400; }
  .field input,
  .field textarea {
    background: #f4f4f4;
    border: 1px solid transparent;
    padding: 14px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #111;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
    width: 100%;
    resize: vertical;
  }
  .field input { height: 46px; }
  .field textarea { min-height: 160px; line-height: 1.6; }
  .field input:focus,
  .field textarea:focus {
    border-color: #111;
    background: #ffffff;
  }
  .field input.err,
  .field textarea.err { border-color: #c0392b; }

  .form-actions { display: flex; align-items: center; gap: 24px; margin-top: 8px; }
  .btn-send {
    background: transparent;
    border: 1px solid #111;
    padding: 14px 36px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #111;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .btn-send:hover { background: #111; color: #fff; }
  .form-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #666;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .form-msg.show { opacity: 1; }
  .form-msg.ok { color: #111; }
  .form-msg.err { color: #c0392b; }

  @media (max-width: 1000px) {
    .contact { grid-template-columns: 1fr; gap: 60px; padding: 110px 40px 80px; }
  }
  @media (max-width: 600px) {
    .contact { padding: 100px 24px 60px; gap: 48px; }
    .field-group { grid-template-columns: 1fr; gap: 18px; }
    .c-title { font-size: 80px; }
  }

  /* ---------- FOLLOW THE JOURNEY ---------- */
  .journey {
    border-top: 1px solid #eee;
    padding: 140px 80px;
    text-align: center;
  }
  .journey .lbl {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #999; margin-bottom: 32px; display: block;
  }
  .journey h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 11vw, 160px);
    letter-spacing: 0.02em; line-height: 0.9;
    margin-bottom: 48px;
    font-weight: 400;
  }
  .journey .handle {
    display: inline-flex; align-items: center; gap: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; letter-spacing: 0.05em;
    color: #111;
    border-bottom: 1px solid #111;
    padding: 4px 2px;
    transition: opacity 0.2s ease;
  }
  .journey .handle:hover { opacity: 0.55; }
  .journey .handle svg { width: 22px; height: 22px; }

  .ig-grid {
    margin-top: 80px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 2px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
  }
  .ig-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: #f4f4f4;
    display: block;
  }
  .ig-tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }
  .ig-tile::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(17,17,17,0);
    transition: background 0.3s ease;
    pointer-events: none;
  }
  .ig-tile:hover img { transform: scale(1.04); }
  .ig-tile:hover::after { background: rgba(17,17,17,0.18); }
  .ig-tile .ig-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    width: 28px; height: 28px;
    color: #fff; opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 2;
  }
  .ig-tile:hover .ig-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  @media (max-width: 900px) { .ig-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px) { .journey { padding: 90px 24px; } .ig-grid { margin-top: 56px; } }

  /* ---------- FOOTER ---------- */
  footer {
    border-top: 1px solid #eee;
    padding: 80px 24px 60px;
    text-align: center;
  }
  footer .f-links {
    display: flex; justify-content: center; gap: 24px;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #444; margin-bottom: 18px; flex-wrap: wrap;
  }
  footer .f-links a:hover { text-decoration: underline; text-underline-offset: 4px; }
  footer .f-meta { font-size: 11px; letter-spacing: 0.15em; color: #999; text-transform: uppercase; }
  footer .dot { color: #ccc; }
</style>

<script>
  const form = document.getElementById('contactForm');
  const msg = document.getElementById('formMsg');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const fields = ['firstName', 'lastName', 'email', 'message'];
    let ok = true;
    fields.forEach((id) => {
      const el = document.getElementById(id);
      const val = el.value.trim();
      if (!val) { el.classList.add('err'); ok = false; }
      else { el.classList.remove('err'); }
    });
    const email = document.getElementById('email');
    if (email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) {
      email.classList.add('err'); ok = false;
    }

    msg.classList.remove('ok', 'err');
    if (!ok) {
      msg.textContent = '> Please fill out all required fields.';
      msg.classList.add('err', 'show');
      return;
    }

    // Compose mailto with form contents as fallback delivery
    const fn = document.getElementById('firstName').value.trim();
    const ln = document.getElementById('lastName').value.trim();
    const em = document.getElementById('email').value.trim();
    const tx = document.getElementById('message').value.trim();
    const subject = encodeURIComponent(`Portfolio enquiry — ${fn} ${ln}`);
    const body = encodeURIComponent(`From: ${fn} ${ln} <${em}>\n\n${tx}`);
    window.location.href = `mailto:alebau0628@gmail.com?subject=${subject}&body=${body}`;

    msg.textContent = '> Message ready in your mail client.';
    msg.classList.add('ok', 'show');
    form.reset();
  });

  // clear error styling on focus
  ['firstName','lastName','email','message'].forEach((id) => {
    document.getElementById(id).addEventListener('input', (e) => e.target.classList.remove('err'));
  });
</script>
